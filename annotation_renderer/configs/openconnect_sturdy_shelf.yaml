$schema: ../schemas/annotation-render-config.schema.json
extends: animation_presets.yaml
default_variant: default
scene:
  objects:
  - id: model
    model:
      scad_file: openconnect_sturdy_shelf.scad
      defines:
        shelf_type: Standard
        add_texture: true
    transform:
      location_mm: [2 * og_tile_size, 0, -og_tile_size]
  transform:
    $constant: wall_placeholder_transform
render:
  fit_margin: 0
annotations:
  style:
    $constant: default_annotation_style
  aliases:
    $constant: default_grid_label_aliases
  chains:
    depth_grids_dimension:
      id: depth_grids
      line_offset_px: 0
      label_offset_px: -50
      label_font_size_px:
        $constant: annotation_label_font_size_px
      color:
        $constant: annotation_color_black
    horizontal_grids_dimension:
      id: horizontal_grids
      line_offset_px: 0
      label_offset_px: 50
      label_font_size_px:
        $constant: annotation_label_font_size_px
      color:
        $constant: annotation_color_black
    shelf_back_thickness_dimension:
      id: shelf_back_thickness
      enabled: false
      line_offset_px: 50
      label_offset_px: 50
      label_font_size_px:
        $constant: annotation_label_font_size_px
      color:
        $constant: annotation_color_blue
    shelf_bottom_thickness_dimension:
      id: shelf_bottom_thickness
      enabled: false
      line_offset_px: -50
      label_offset_px: -50
      label_font_size_px:
        $constant: annotation_label_font_size_px
      color:
        $constant: annotation_color_blue
  angle_radius_callouts:
    shelf_corner_fillet_callout:
      enabled: false
      id: shelf_corner_fillet_detail
      arc_id: shelf_corner_fillet_extent
      radius_id: shelf_corner_fillet
      optional: true
      show_angle_label: false
      radius_label_offset_px: 120
      radius_label_tangent_offset_px: 20
      angle_fill_alpha: 28
gallery:
  $constant: parameter_gallery_settings
variant_collections:
  product_views: [default, empty, side]
  parameter_gallery: [Slim_NoTexture, Slim_NoTexture_NoEdges, Standard_NoTexture,
    Split_Left_NoTexture]
variants:
- name: default
- name: empty
  render:
    lighting:
      toplight_power: 1.5
      frontlight_power: 1.5
  annotation_overrides:
    depth_grids_dimension:
      enabled: false
    horizontal_grids_dimension:
      enabled: false
  unset: [scene.objects.model.model.defines.shelf_type, scene.objects.model.model.defines.add_texture]
- name: side
  object_overrides:
    model:
      model:
        defines:
          add_texture: false
          shelf_corner_fillet: 15
          add_right_edge: false
          add_front_edge: false
  render:
    camera_view: bottom
  annotation_overrides:
    depth_grids_dimension:
      enabled: false
    horizontal_grids_dimension:
      enabled: false
    shelf_back_thickness_dimension:
      enabled: true
    shelf_bottom_thickness_dimension:
      enabled: true
    shelf_corner_fillet_callout:
      enabled: true
- name: Slim_NoTexture
  extends_variant: empty
  object_overrides:
    model:
      model:
        defines:
          shelf_type: Slim
          add_texture: false
          horizontal_grids: 2
          depth_grids: 2
- name: Slim_NoTexture_NoEdges
  extends_variant: empty
  object_overrides:
    model:
      model:
        defines:
          shelf_type: Slim
          add_texture: false
          add_right_edge: false
          add_left_edge: false
          add_front_edge: false
          horizontal_grids: 2
          depth_grids: 2
- name: Standard_NoTexture
  extends_variant: empty
  object_overrides:
    model:
      model:
        defines:
          add_texture: false
          horizontal_grids: 2
          depth_grids: 2
- name: Split_Left_NoTexture
  extends_variant: empty
  object_overrides:
    model:
      model:
        defines:
          add_texture: false
          add_right_connector_holes: true
          add_right_edge: false
          horizontal_grids: 2
          depth_grids: 2
