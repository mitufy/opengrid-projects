$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
variant_name: opengrid_snap_gadget_clip_default
job_name: snap_gadget_clip_scene
scene:
  objects:
  - id: clip_a
    model:
      scad_file: opengrid_snap_gadget_clip.scad
      defines:
        clip_shape: Rectangular
        clip_main_width: 30
        clip_main_depth: 12
        tip_diameter: 0
        clip_surround_angle: 145
        clip_thickness_scale: 1
    transform:
      location_mm: [-14, 0, -20.6]
      rotation_deg: [0, 0, 0]
  - id: snap_a
    $constant: expanding_snap_object
    transform:
      location_mm: [-14, 0, -14]
      rotation_deg: [-90, 180, 0]
  - id: clip_b
    model:
      scad_file: opengrid_snap_gadget_clip.scad
      defines:
        # clip_shape: Elliptic
        # clip_main_depth: 25
        knurling_type: Diamond
    transform:
      location_mm: [42, 0, -20.6]
      rotation_deg: [0, 0, 0]
  - id: snap_b
    $constant: expanding_snap_object
    transform:
      location_mm: [42, 0, -14]
      rotation_deg: [-90, 180, 0]
  # - id: clip_c
  #   model:
  #     scad_file: opengrid_snap_gadget_clip.scad
