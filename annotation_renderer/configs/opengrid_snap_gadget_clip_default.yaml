  #     rotation_deg: [-90, 180, 0]
render:
  fit_margin: 0
  # camera_location_offset_mm: [-15, 0, 0]
  # camera_rotation_offset_deg: [0, 0, 5]
annotations:
  style:
    $constant: default_annotation_style
    auto_adjust_labels: true
    type_styles:
      mm:
        line_colors:
        - $constant: annotation_color_black
  chains:
  - ids: [clip_main_width]
    display_offset_mm: [0, 0, 0]
    line_offset_px: 20
    label_offset_px: 50
    label_font_size_px:
      $constant: annotation_label_font_size_px
  # - ids: [clip_main_depth]
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: -0
  #   label_offset_px: 56
  #   label_font_size_px: 24
  # - ids: [clip_thickness]
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: -0
  #   label_offset_px: -28
  #   label_font_size_px: 24
  - ids: [clip_height]
    display_offset_mm: [0, 0, 0]
    line_offset_px: 50
    label_offset_px: 50
    label_font_size_px:
      $constant: annotation_label_font_size_px
