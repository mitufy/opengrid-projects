$schema: ../schemas/annotation-render-config.schema.json
extends: drawer_base.yaml
variant_name: openconnect_drawer_shell_container_default
job_name: openconnect_drawer_shell_container_scene_default
scene:
  object_defaults:
    $constant: drawer_object_defaults
  objects:
  - $constant: drawer_shell_object_top
  - $constant: drawer_container_object_top
render:
  fit_margin: 0
  camera_location_offset_mm: [0, 0, 0]
  # camera_rotation_offset_deg: [0, 0, 0]
  # camera_look_at: object_center
  # camera_view_preset: top_front
  camera_view: "front"
  camera_orbit_deg: [0, 72]
  lighting:
    toplight_power: 3
    frontlight_power: 1
annotations:   
  image_labels:
  - $constant: top_image_label
    id: shell_slot_position
    offset_px: [0, 0]
    show_value: true
    value_color:
      $constant: annotation_color_blue
    font_size_px:
      $constant: annotation_title_font_size_px
