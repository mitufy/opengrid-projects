$schema: ../schemas/annotation-render-config.schema.json
job_name: opengrid_annotation_base
constants:
  annotation_label_font_size_px: 38
  annotation_title_font_size_px: 40
  annotation_aux_label_font_size_px: 30
  annotation_font: sans
  annotation_color_black: '#000000'
  annotation_color_blue: '#4169E1'
  annotation_color_red: '#FF0000'
  annotation_color_white: '#ffffff'
  gallery_outline_color: '#111827'
  gallery_neutral_material_color: '#8fa1b3'
  og_tile_size: 28
  og_standard_thickness: 6.8
  blender_scene_scale: 0.001
  blender_scene_scale_vector: [blender_scene_scale, blender_scene_scale, blender_scene_scale]
  placeholder_transform:
    location_mm: [0, 0, 0]
    rotation_deg: [0, 0, 0]
    scale:
      $constant: blender_scene_scale_vector
  wall_placeholder_transform:
    location_mm: [0, 0, 0]
    rotation_deg: [90, 0, -90]
    scale:
      $constant: blender_scene_scale_vector
  small_dimension_chain:
    line_offset_px: 28
    label_offset_px: 24
    label_font_size_px:
      $constant: annotation_label_font_size_px
    tick_length_px: 12
    line_width_px: 2.2
    extension_width_px: 1.2
  bottom_image_label:
    position: bottom
    offset_px: [0, -24]
    font_size_px:
      $constant: annotation_title_font_size_px
  default_grid_label_aliases:
    horizontal_grids: horizontal_grids x 28mm
    vertical_grids: vertical_grids x 28mm
    depth_grids: depth_grids x 28mm
  expanding_snap_object:
    model:
      scad_file: opengrid_expanding_snap.scad
      defines:
        generate_screw: None
    transform:
      location_mm: [14, 0, -14]
      rotation_deg: [-90, 180, 0]
  default_annotation_style:
    line_alpha: 255
    line_width_px: 2.3
    extension_width_px: 1.1
    tick_length_px: 14
    radial_line_width_px: 2.1
    label_font_size_px:
      $constant: annotation_label_font_size_px
    angle_fill_color:
      $constant: annotation_color_red
    image_label_margin_px: 32
    image_label_title_area: true
    image_label_title_positions: [bottom]
    image_label_title_padding_x_px: 34
    image_label_title_padding_y_px: 12
    image_label_title_radius_px: 18
    image_label_title_fill_color:
      $constant: annotation_color_white
    image_label_title_fill_alpha: 224
    image_label_title_outline_color:
      $constant: annotation_color_black
    image_label_title_outline_alpha: 255
    image_label_title_outline_width_px: 4
    image_label_title_min_width_px: 620
    image_label_title_top_margin_px: 18
    image_label_title_bottom_margin_px: 18
    type_styles:
      grids:
        line_colors:
        - $constant: annotation_color_blue
        font:
          $constant: annotation_font
        text_shade: 1.0
      mm:
        line_colors:
        - $constant: annotation_color_black
        font:
          $constant: annotation_font
        text_shade: 1.0
      radius:
        line_colors:
        - $constant: annotation_color_red
        font:
          $constant: annotation_font
        text_shade: 1.0
      angle:
        line_colors:
        - $constant: annotation_color_red
        font:
          $constant: annotation_font
        text_shade: 1.0
scene:
  blend_file: ../assets/scenes/opengrid_wall_scene.blend
  camera: Camera
  replace_target_object: true
  inherit_target_transform: false
  transform:
    $constant: placeholder_transform
render:
  preset: cycles_standard_scene
annotations: {}
