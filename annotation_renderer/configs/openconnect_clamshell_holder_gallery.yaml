$schema: ../schemas/annotation-render-config.schema.json
extends: openconnect_clamshell_holder_empty.yaml
job_name: clamshell_holder_parameter_gallery

gallery:
  columns: 2
  target_width_px: 1920
  target_height_px: 1440
  margin_px: 0
  gutter_px: 4
  title_height_px: 45
  title_font_size_px: 45

variants:
- name: width164_height60_column1
  set:
    scene.objects[0].model.defines.item_width: 164
    scene.objects[0].model.defines.item_height: 60
    scene.objects[0].model.defines.item_corner_rounding: 8
    scene.objects[0].model.defines.holder_slot_column_limit: 1

- name: width164_height60_column2
  set:
    scene.objects[0].model.defines.item_width: 164
    scene.objects[0].model.defines.item_height: 60
    scene.objects[0].model.defines.item_corner_rounding: 8
    scene.objects[0].model.defines.holder_slot_column_limit: 2

- name: width164_height60_column1_slotpos_front
  set:
    scene.objects[0].model.defines.item_width: 164
    scene.objects[0].model.defines.item_height: 60
    scene.objects[0].model.defines.item_corner_rounding: 8
    scene.objects[0].model.defines.holder_slot_column_limit: 1
    scene.objects[0].model.defines.holder_slot_position: Front
    scene.objects[0].model.defines.slot_slide_direction: Down
    scene.objects[0].transform.location_mm: [0, "-(item_height / 2 + og_standard_thickness / 2)", 0]
    scene.objects[0].transform.rotation_deg: [180, 0, 0]

- name: width120_height100_rounding20_column1
  set:
    scene.objects[0].model.defines.item_width: 120
    scene.objects[0].model.defines.item_height: 100
    scene.objects[0].model.defines.item_corner_rounding: 20
    scene.objects[0].model.defines.holder_slot_column_limit: 1
    scene.objects[0].transform.location_mm: [0, "-(item_depth + og_standard_thickness)", -14]

