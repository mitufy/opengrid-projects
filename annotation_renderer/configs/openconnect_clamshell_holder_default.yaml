  #   line_offset_px: 0
  #   label_offset_px: 30
  # - ids: [item_height]
  #   display_offset_mm: [8, 0, 0]
  #   line_offset_px: 0
  #   label_offset_px: 28
  # - ids: [item_depth]
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: 0
  #   label_offset_px: 24
  # - ids: [front_opening_side_margin]
  #   optional: true
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: 0
  #   label_offset_px: 24
  # - ids: [front_opening_end_margin]
  #   optional: true
  #   display_offset_mm: [8, 0, 0]
  #   line_offset_px: 0
  #   label_offset_px: 24
  # angle_radius_callouts:
  # - id: item_corner_rounding_fillet
  #   arc_id: item_corner_rounding_extent
  #   radius_id: item_corner_rounding
  #   angle_id: item_corner_rounding
  #   optional: true
  #   show_angle_label: false
  #   radius_label_offset_px: 36
