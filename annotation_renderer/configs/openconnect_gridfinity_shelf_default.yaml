$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
variant_name: openconnect_gridfinity_shelf_default
job_name: gridfinity_shelf_scene_default
scene:
  objects:
  - id: model
    model:
      scad_file: openconnect_gridfinity_shelf.scad
      defines:
        gridfinity_width_grids: 2
        gridfinity_depth_grids: 2
        shelf_side_rim: 4
        shelf_front_rim: 4
        shelf_rim_lip_height: 3
        magnet_position: Corners Only
  transform:
    $constant: placeholder_transform
render:
  fit_margin: 0.12
  camera_view_preset: top_front
annotations:
  style:
    $constant: default_annotation_style
    auto_adjust_labels: true
    colors:
      gridfinity_width_grids: '#000000'
      gridfinity_depth_grids: '#000000'
      shelf_side_rim: '#dc2626'
      shelf_front_rim: '#dc2626'
      shelf_rim_lip_height: '#dc2626'
  aliases:
    gridfinity_width_grids: gridfinity_width_grids x 42mm
    gridfinity_depth_grids: gridfinity_depth_grids x 42mm
    shelf_rim_lip_height: rim_lip_height
  chains:
  - ids: [gridfinity_width_grids]
    line_offset_px: 0
    label_offset_px: 30
    label_font_size_px: 26
  - ids: [gridfinity_depth_grids]
    line_offset_px: 0
    label_offset_px: -30
    label_font_size_px: 26
  - ids: [shelf_side_rim]
    optional: true
    line_offset_px: 70
    label_offset_px: 46
    label_along_offset_px: -52
    label_font_size_px: 22
    tick_length_px: 12
  - ids: [shelf_front_rim]
    optional: true
    line_offset_px: -88
    label_offset_px: -54
    label_along_offset_px: 42
    label_font_size_px: 22
    tick_length_px: 12
  - ids: [shelf_rim_lip_height]
    optional: true
    line_offset_px: 46
    label_offset_px: 28
    label_along_offset_px: 36
    label_font_size_px: 22
    tick_length_px: 12
  image_labels:
  - $constant: bottom_image_label
    id: magnet_position
    show_value: true
    value_color: '#2563eb'
    font_size_px:
      $constant: annotation_aux_label_font_size_px
  - $constant: bottom_image_label
    id: gridfinity_socket_clearance
    offset_px: [0, 44]
    show_value: true
    value_color: '#2563eb'
    font_size_px:
      $constant: annotation_aux_label_font_size_px
