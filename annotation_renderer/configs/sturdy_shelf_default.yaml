$schema: ../schemas/annotation-render-config.schema.json
extends: animation_presets.yaml
variant_name: sturdy_shelf_default
job_name: sturdy_shelf_scene_default
constants:
  sturdy_shelf_model:
    scad_file: openconnect_sturdy_shelf.scad
    defines:
      shelf_type: Standard
      add_texture: false
  sturdy_shelf_annotations:
    chains:
    - ids: [shelf_depth]
    - ids: [shelf_width]
    - $constant: small_dimension_chain
      ids: [shelf_back_thickness]
    - $constant: small_dimension_chain
      ids: [shelf_bottom_thickness]
    image_labels:
    - $constant: bottom_image_label
      id: shelf_type
      show_value: true
model:
  $constant: sturdy_shelf_model
scene:
  transform:
    $constant: wall_placeholder_transform
annotations:
  $constant: sturdy_shelf_annotations
