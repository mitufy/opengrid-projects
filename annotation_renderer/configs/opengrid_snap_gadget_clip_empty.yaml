$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
variant_name: opengrid_snap_gadget_clip_default
job_name: snap_gadget_clip_scene
scene:
  objects:
  - id: model
    model:
      scad_file: opengrid_snap_gadget_clip.scad
    transform:
      location_mm: [-14, 0, -20.6]
      rotation_deg: [0, 0, 0]
  - id: snap_a
    $constant: expanding_snap_object
    transform:
      location_mm: [-14, 0, -14]
      rotation_deg: [-90, 180, 0]
render:
  fit_margin: 0
  camera_view_preset: technical_iso
  # camera_view_preset: top_front
  # camera_view: top
  # camera_rotation_offset_deg: [-60, 0, -30]
  # export_blend: true
annotations:
  style:
    $constant: default_annotation_style