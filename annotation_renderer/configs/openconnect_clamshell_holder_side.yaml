$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
variant_name: openconnect_clamshell_holder_default
job_name: clamshell_holder_scene_default
scene:
  objects:
  - id: model
    model:
      scad_file: openconnect_clamshell_holder.scad
      defines:
        item_width: 164
        item_height: 60
        item_depth: 30
        item_corner_rounding: 8
        generate_holder_part: Both
        holder_slot_position: Top
        # side_opening_bottom_margin: 5
        side_opening_top_margin: 5
        holder_slot_column_limit: 1
    inherit_target_transform: false
    transform:
      location_mm: [0, "-(item_height / 2 + og_standard_thickness)", 0]
      rotation_deg: [-90, 0, 0]
      scale:
        $constant: blender_scene_scale_vector
render:
  fit_margin: 0.1
  camera_view: right
annotations:
  style:
    $constant: default_annotation_style
    colors:
      item_width:
        $constant: annotation_color_black
      item_height:
        $constant: annotation_color_black
      item_depth:
        $constant: annotation_color_black
      side_opening_front_margin:
        $constant: annotation_color_blue
      side_opening_back_margin:
        $constant: annotation_color_blue
      side_opening_top_margin:
        $constant: annotation_color_red
      side_opening_bottom_margin:
        $constant: annotation_color_red
  aliases:
    holder_slot_position: slot_position
    item_corner_rounding_extent: item_corner_rounding
  chains:
  # - ids: [item_width]
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: -28
  #   label_offset_px: -28
  #   font_size_px: 26
  # - ids: [item_height]
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: 28
  #   label_offset_px: 28
  #   font_size_px: 26
  - ids: [item_depth]
    display_offset_mm: [0, 0, 0]
    line_offset_px: 56
    label_offset_px: 28
    label_font_size_px:
      $constant: annotation_label_font_size_px
  # - ids: [front_opening_side_margin]
  #   optional: true
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: 28
  #   label_offset_px: 28
  #   font_size_px: 24
  # - ids: [front_opening_end_margin]
  #   optional: true
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: -28
  #   label_offset_px: -28
  #   font_size_px: 24
  - ids: [side_opening_front_margin]
    optional: true
    display_offset_mm: [0, 0, 0]
    line_offset_px: 200
    label_offset_px: 28
    label_along_offset_px: 0
    label_font_size_px:
      $constant: annotation_label_font_size_px
  - ids: [side_opening_back_margin]
    optional: true
    display_offset_mm: [0, 0, 0]
    line_offset_px: -200
    label_offset_px: -28
    label_along_offset_px: 0
    label_font_size_px:
      $constant: annotation_label_font_size_px
  - ids: [side_opening_top_margin]
    optional: true
    display_offset_mm: [0, 0, 0]
    line_offset_px: -60
    label_offset_px: -28
    label_font_size_px:
      $constant: annotation_label_font_size_px
  - ids: [side_opening_bottom_margin]
    optional: true
    display_offset_mm: [0, 0, 0]
    line_offset_px: 60
    label_offset_px: 28
    label_font_size_px:
      $constant: annotation_label_font_size_px
