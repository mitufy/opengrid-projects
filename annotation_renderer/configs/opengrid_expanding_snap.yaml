$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
variant_name: opengrid_expanding_snap
job_name: opengrid_expanding_snap
scene:
  objects:
  - id: snap
    $constant: expanding_snap_object
  - id: screw
    model:
      scad_file: opengrid_parametric_snap.scad
      defines:
        generate_screw: openConnect
        generate_snap: None
    transform:
      location_mm: [14, 6.8, -14]
      rotation_deg: [90, 0, 0]
render:
  fit_margin: 0.3
  camera_view: bottom
annotations:
  style:
    $constant: default_annotation_style
    auto_adjust_labels: true
    tick_length_px: 12
    type_styles:
      mm:
        line_colors: ['#000000']