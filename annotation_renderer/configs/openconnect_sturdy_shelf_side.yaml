$schema: ../schemas/annotation-render-config.schema.json
extends: animation_presets.yaml
variant_name: openconnect_sturdy_shelf_default
job_name: sturdy_shelf_scene_side
scene:
  objects:
  - id: model
    model:
      scad_file: openconnect_sturdy_shelf.scad
      defines:
        shelf_type: Standard
        add_texture: false
        shelf_corner_fillet: 15
        add_right_edge: false
        add_front_edge: false
    transform:
      location_mm: [56, 0, -28]
  transform:
    $constant: wall_placeholder_transform
render:
  fit_margin: 0
  # camera_location_offset_mm: [30, 0, 0]
  # camera_rotation_offset_deg: [0, 0, 10]
  camera_view: bottom
annotations:
  style:
    $constant: default_annotation_style
  aliases:
    $constant: default_grid_label_aliases
  chains:
  # - ids: [depth_grids]
  # - ids: [horizontal_grids]
  # - $constant: small_dimension_chain
  - ids: [shelf_back_thickness]
    line_offset_px: 50
    label_offset_px: 50
    label_font_size_px:
      $constant: annotation_label_font_size_px
    color:
      $constant: annotation_color_blue
  - ids: [shelf_bottom_thickness]
    line_offset_px: -50
    label_offset_px: -50
    label_font_size_px:
      $constant: annotation_label_font_size_px
    color:
      $constant: annotation_color_blue
  angle_radius_callouts:
  - id: shelf_corner_fillet_detail
    arc_id: shelf_corner_fillet_extent
    radius_id: shelf_corner_fillet
    optional: true
    show_angle_label: false
    radius_label_offset_px: 120
    radius_label_tangent_offset_px: 20
    angle_fill_alpha: 28
  # image_labels:
  # - $constant: bottom_image_label
  #   id: shelf_type
  #   show_value: true
  #   color:
  #     $constant: annotation_color_black
  #   value_color:
  #     $constant: annotation_color_blue
