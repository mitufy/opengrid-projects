$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
variant_name: opengrid_framefit_hook_default
job_name: framefit_hook_scene
scene:
  objects:
  - id: model
    model:
      scad_file: opengrid_framefit_hook.scad
      defines:
        hook_length: 28
        hook_tip_length: 10
    transform:
      location_mm: [0, 0, -56]
      rotation_deg: [0, 0, 180]
  - id: large_hook
    model:
      scad_file: opengrid_framefit_hook.scad
      defines:
        hook_width: 8
        hook_corner_angle: 45
        hook_tip_angle: 90
        hook_length: 16
        hook_tip_length: 4
    transform:
      location_mm: [28, 0, -56]
      rotation_deg: [0, 0, 180]
  - id: truss_hook
    model:
      scad_file: opengrid_framefit_hook.scad
      defines:
        hook_width: 10
        hook_length: 32
        hook_tip_length: 12
        truss_vertical_grid: 1
    transform:
      location_mm: [-28, 0, -56]
      rotation_deg: [0, 0, 180]
render:
  fit_margin: 0
annotations:
  style:
    $constant: default_annotation_style
    auto_adjust_labels: true
    tick_length_px: 12
    type_styles:
      grids:
        line_colors:
        - $constant: annotation_color_blue
      mm:
        line_colors:
        - $constant: annotation_color_black
  aliases:
    hook_vertical_grids: hook_vertical_grids x 28mm
    truss_vertical_grid: truss_vertical_grid x 28mm
    hook_tip_shape: hook_tip_shape
  chains:
  - ids: [hook_width]
    display_offset_mm: [0, 0, 0]
    line_offset_px: 28
    label_offset_px: 28
    label_font_size_px:
      $constant: annotation_label_font_size_px
  - ids: [hook_length]
    display_offset_mm: [0, 0, 0]
    line_offset_px: -28
    label_offset_px: -28
    label_font_size_px:
      $constant: annotation_label_font_size_px
  # - ids: [hook_back_thickness]
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: -28
  #   label_offset_px: -28
  #   label_font_size_px: 24
  # - ids: [hook_tip_length]
  #   display_offset_mm: [0, 0, 0]
  #   line_offset_px: -28
  #   label_offset_px: -28
  #   label_font_size_px: 24
  - ids: [hook_vertical_grids, truss_vertical_grid]
    optional: true
    display_offset_mm: [0, 0, 0]
    line_offset_px: 28
    label_offset_px: 28
    label_font_size_px:
      $constant: annotation_label_font_size_px
