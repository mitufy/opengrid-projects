$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
variant_name: openconnect_snap_annotated
job_name: openconnect_snap_annotated
scene:
  objects:
  - id: snap
    model:
      scad_file: opengrid_parametric_snap.scad
      defines:
        generate_snap: openConnect
        generate_screw: None
    transform:
      location_mm: [0, 0, 0]
      rotation_deg: [0, 0, 0]
      scale:
        $constant: blender_scene_scale_vector
render:
  width: 2400
  height: 1800
  fit_margin: 0.22
  camera_view_preset: technical_iso
  camera_distance_scale: 1.08
annotations:
  object: snap
  style:
    $constant: default_annotation_style
    auto_adjust_labels: true
    show_values: false
    label_font_size_px: 46
    tick_length_px: 11
    line_width_px: 3
    type_styles:
      mm:
        line_colors:
        - $constant: annotation_color_black
      radius:
        line_colors:
        - $constant: annotation_color_red
  chains:
  - ids: [ochead_bottom_height, ochead_middle_height, ochead_top_height]
    labels:
      ochead_bottom_height: "0.6"
      ochead_middle_height: "1.4"
      ochead_top_height: "0.6"
    line_offset_px: 72
    label_offset_px: 58
    label_along_offset_px: 0
  - ids: [ochead_large_rect_width]
    labels:
      ochead_large_rect_width: "17"
    line_offset_px: -80
    label_offset_px: -60
  - ids: [ochead_large_rect_height]
    labels:
      ochead_large_rect_height: "10.6"
    line_offset_px: 72
    label_offset_px: 54
  - ids: [ochead_large_rect_chamfer]
    labels:
      ochead_large_rect_chamfer: "4"
    line_offset_px: -42
    label_offset_px: -36
  - ids: [ochead_nub_to_top_distance]
    labels:
      ochead_nub_to_top_distance: "7.2"
    line_offset_px: 86
    label_offset_px: 54
  - ids: [ochead_nub_depth]
    labels:
      ochead_nub_depth: "0.6"
    line_offset_px: -66
    label_offset_px: -42
    label_along_offset_px: 90
  - ids: [ochead_nub_tip_height]
    labels:
      ochead_nub_tip_height: "1.2"
    line_offset_px: 50
    label_offset_px: 36
  - ids: [ochead_back_pos_offset]
    labels:
      ochead_back_pos_offset: "0.4"
    line_offset_px: -34
    label_offset_px: -28
  - ids: [OCSLOT_MOVE_DISTANCE]
    labels:
      OCSLOT_MOVE_DISTANCE: "10.6"
    line_offset_px: 104
    label_offset_px: 64
  - ids: [OCSLOT_ONRAMP_CLEARANCE]
    labels:
      OCSLOT_ONRAMP_CLEARANCE: "0.8"
    line_offset_px: -70
    label_offset_px: -44
  radius_callouts:
  - ids: [ochead_nub_fillet]
    labels:
      ochead_nub_fillet: "0.8"
    label_offset_px: -92
