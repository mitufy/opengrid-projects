$schema: ../schemas/annotation-render-config.schema.json
extends: animation_presets.yaml
variant_name: openconnect_general_holder_default
job_name: general_holder_scene_default
constants:
  general_holder_model:
    scad_file: openconnect_general_holder.scad
    defines:
      compartment_shape: Rectangular
      compartment_column_count: 2
      compartment_row_count: 1
  general_holder_annotations:
    style:
      line_alpha: 255
      line_width_px: 2.3
      extension_width_px: 1.1
      tick_length_px: 14
      radial_line_width_px: 2.1
      label_font_size_px:
        $constant: annotation_label_font_size_px
      angle_fill_color: '#dc2626'
      image_label_margin_px: 32
      image_label_title_area: true
      image_label_title_padding_x_px: 34
      image_label_title_padding_y_px: 12
      image_label_title_radius_px: 18
      image_label_title_fill_color: '#ffffff'
      image_label_title_fill_alpha: 224
      image_label_title_outline_color: '#000000'
      image_label_title_outline_alpha: 255
      image_label_title_outline_width_px: 4
      image_label_title_min_width_px: 620
      image_label_title_bottom_margin_px: 18
      colors:
        compartment_width: '#000000'
        compartment_depth: '#000000'
        holder_height: '#000000'
        front_opening_width: '#2563eb'
        front_opening_height: '#2563eb'
        holder_tilt_angle: '#dc2626'
        holder_back_offset: '#2563eb'
        compartment_bottom_width: '#2563eb'
        compartment_bottom_depth: '#2563eb'
        holder_vertical_divider_thickness: '#2563eb'
        holder_horizontal_divider_thickness: '#2563eb'
    aliases:
      compartment_shape: holder_shape
    chains:
    - ids: [compartment_width]
      display_offset_mm: [0, 0, 0]
      line_offset_px: 0
      label_offset_px: 28
    - ids: [compartment_depth]
      optional: true
      display_offset_mm: [0, 0, 0]
      line_offset_px: 0
      label_offset_px: 24
    - ids: [holder_height]
      display_offset_mm: [0, 0, 0]
      line_offset_px: -12
      label_offset_px: -24
    - ids: [front_opening_width]
      optional: true
      display_offset_mm: [0, 0, 0]
      line_offset_px: 0
      label_offset_px: 24
    - ids: [front_opening_height]
      optional: true
      display_offset_mm: [0, 0, 0]
      line_offset_px: 0
      label_offset_px: 24
    angle_radius_callouts:
    - id: holder_tilt_angle_callout
      arc_id: holder_tilt_angle_extent
      radius_id: holder_tilt_angle_radius
      angle_id: holder_tilt_angle
      optional: true
      show_radius_label: false
      angle_label_offset_px: 34
      angle_fill_alpha: 28
    image_labels:
    - $constant: bottom_image_label
      id: compartment_shape
      offset_px: [0, 0]
      show_value: true
      value_color: '#2563eb'
      font_size_px:
        $constant: annotation_title_font_size_px
model:
  $constant: general_holder_model
scene:
  transform:
    location_mm: [0, 0, 0]
    rotation_deg: [holder_tilt_angle, 0, 0]
    scale:
      $constant: blender_scene_scale_vector
render:
  fit_margin: 0.16
  camera_location_offset_mm: [0, 0, 100]
  camera_look_at: object_center
annotations:
  $constant: general_holder_annotations
