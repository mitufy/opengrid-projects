$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
variant_name: openconnect_sturdy_hook_default
job_name: sturdy_hook_scene
scene:
  objects:
  # - id: model
  #   model:
  #     $constant: sturdy_hook_model
  #   transform:
  #     location_mm: [56, 0, -28]
  - id: large_hook
    model:
      scad_file: openconnect_sturdy_hook.scad
      defines:
        hook_length: 56
        hook_vertical_grids: 2
        circular_tip_radius: 28
        hook_corner_fillet: 28
  transform:
    $constant: wall_placeholder_transform

render:
  fit_margin: 0
  # camera_location_offset_mm: [30, 0, 0]
  # camera_rotation_offset_deg: [0, 0, 10]
  # camera_look_at: object_center
annotations:
  style:
    $constant: default_annotation_style
    auto_adjust_labels: false
    tick_length_px: 15
    type_styles:
      grids:
        line_colors:
        - $constant: annotation_color_blue
      mm:
        line_colors:
        - $constant: annotation_color_black
    line_width_px: 3.0
    extension_width_px: 1.4
    radial_line_width_px: 2.6
  aliases:
    hook_vertical_grids: hook_vertical_grids x 28mm
    truss_vertical_grids: truss_vertical_grids x 28mm
    hook_shape_type: hook_shape
    hook_corner_fillet: corner_fillet
    hook_corner_fillet_extent: corner_fillet
    circular_tip_radius: tip_radius
    circular_tip_radius_extent: tip_radius
    circular_tip_angle: tip_angle
  # angle_radius_callouts:
  # - id: hook_corner_fillet_detail
  #   arc_id: hook_corner_fillet_extent
  #   radius_id: hook_corner_fillet
  #   optional: true
  #   show_angle_label: false
  #   radius_label_offset_px: 26
  #   angle_fill_alpha: 28
  chains:
  - ids: [hook_width]
    display_offset_mm: [0, 0, 0]
    line_offset_px: 30
    label_offset_px: 40
    label_font_size_px:
      $constant: annotation_label_font_size_px
  - ids: [hook_thickness]
    display_offset_mm: [0, 0, 0]
    label_along_offset_px: -80
    line_offset_px: -1
    label_offset_px: -40
    label_font_size_px:
      $constant: annotation_label_font_size_px
  - ids: [hook_length]
    display_offset_mm: [0, 0, 0]
    label_along_offset_px: 60
    line_offset_px: -1
    label_offset_px: -40
    label_font_size_px:
      $constant: annotation_label_font_size_px
  - ids: [hook_vertical_grids, truss_vertical_grids]
    optional: true
    display_offset_mm: [0, 0, 0]
    label_along_offset_px: -60
    line_offset_px: -1
    label_offset_px: -40
    label_font_size_px:
      $constant: annotation_label_font_size_px
  # image_labels:
  # - $constant: bottom_image_label
  #   id: hook_shape_type
  #   offset_px: [0, -6]
  #   show_value: true
  #   value_color: '#0000FF'
  #   font_size_px:
  #     $constant: annotation_title_font_size_px
