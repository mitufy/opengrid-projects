$schema: ../schemas/annotation-render-config.schema.json
extends: opengrid_snap_gadget_clip_empty.yaml
job_name: opengrid_snap_gadget_clip_parameter_gallery

gallery:
  columns: 2
  target_width_px: 1920
  target_height_px: 1440
  margin_px: 0
  gutter_px: 4
  title_height_px: 60
  title_font_size_px: 60
variants:
- name: Circular_Stem15
  set:
    scene.objects[0].model.defines.clip_shape: Circular
    # scene.objects[0].model.defines.hook_tip_angle: 180
    # scene.objects[0].model.defines.clip_main_depth: 22
    scene.objects[0].model.defines.clip_stem_length: 15

- name: Circular_Vertical_Tilt45
  set:
    scene.objects[0].model.defines.clip_orientation: Vertical
    scene.objects[0].model.defines.clip_entry_tilt_angle: 45
    scene.objects[0].transform.location_mm: [-7.4, 0, -14]
    scene.objects[0].transform.rotation_deg: [0, -90, 0]

- name: Elliptic_Surround120
  set:
    scene.objects[0].model.defines.clip_shape: Elliptic
    scene.objects[0].model.defines.clip_surround_angle: 120
    scene.objects[0].model.defines.clip_main_width: 30
    scene.objects[0].model.defines.clip_main_depth: 13
    # scene.objects[0].model.defines.tip_diameter: 0
    # scene.objects[0].model.defines.clip_thickness_scale: 1

- name: Rectangular_NoTip_Surround180
  set:
    scene.objects[0].model.defines.clip_shape: Rectangular
    scene.objects[0].model.defines.clip_surround_angle: 180
    scene.objects[0].model.defines.clip_main_width: 30
    scene.objects[0].model.defines.clip_main_depth: 13
    scene.objects[0].model.defines.tip_diameter: 0
    scene.objects[0].model.defines.clip_thickness_scale: 1

