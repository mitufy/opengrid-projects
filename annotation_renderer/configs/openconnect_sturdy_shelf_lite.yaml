$schema: ../schemas/annotation-render-config.schema.json
extends: animation_presets.yaml
variant_name: openconnect_sturdy_shelf_lite
job_name: sturdy_shelf_scene_lite
constants:
  sturdy_shelf_model:
    scad_file: openconnect_sturdy_shelf.scad
    defines:
      add_texture: true
  sturdy_shelf_annotations:
    style:
      $constant: default_annotation_style
    aliases:
      $constant: default_grid_label_aliases
    chains:
    - ids: [depth_grids]
    - ids: [horizontal_grids]
    # - $constant: small_dimension_chain
    #   ids: [shelf_back_thickness]
    # - $constant: small_dimension_chain
    #   ids: [shelf_bottom_thickness]
    image_labels:
    - $constant: bottom_image_label
      id: shelf_type
      show_value: true
scene:
  objects:
  - id: model
    model:
      $constant: sturdy_shelf_model
      defines:
        shelf_type: Slim
    transform:
      location_mm: [56, 0, -28]
  transform:
    $constant: wall_placeholder_transform
annotations:
  $constant: sturdy_shelf_annotations
