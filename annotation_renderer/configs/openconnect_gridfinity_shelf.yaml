$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
default_variant: default
scene:
  objects:
  - id: model
    model:
      scad_file: openconnect_gridfinity_shelf.scad
      defines:
        gridfinity_width_grids: 2
        gridfinity_depth_grids: 2
        magnet_position: All
    transform:
      location_mm: [-og_tile_size, 0, -og_tile_size]
      rotation_deg: [-print_bottom_angle, 0, 0]
render:
  fit_margin: 0.2
  camera_location_offset_mm: [-50, 0, 20]
  camera_look_at: object_center
annotations:
  style:
    $constant: default_annotation_style
    auto_adjust_labels: true
  aliases:
    gridfinity_width_grids: gridfinity_width_grids x 42mm
    gridfinity_depth_grids: gridfinity_depth_grids x 42mm
  chains:
    gridfinity_width_dimension:
      id: gridfinity_width_grids
      color:
        $constant: annotation_color_black
      line_offset_px: -80
      label_offset_px: -50
      label_font_size_px:
        $constant: annotation_label_font_size_px
    gridfinity_depth_dimension:
      id: gridfinity_depth_grids
      color:
        $constant: annotation_color_black
      line_offset_px: -150
      label_offset_px: -50
      label_font_size_px:
        $constant: annotation_label_font_size_px
    shelf_back_offset_dimension:
      id: shelf_back_offset
      enabled: false
      optional: true
      line_offset_px: -30
      label_offset_px: -50
      color:
        $constant: annotation_color_black
    shelf_side_rim_dimension:
      id: shelf_side_rim
      enabled: false
      optional: true
      line_offset_px: -50
      label_offset_px: -50
      label_along_offset_px: 52
      color:
        $constant: annotation_color_red
    shelf_front_rim_dimension:
      id: shelf_front_rim
      enabled: false
      optional: true
      line_offset_px: -30
      label_offset_px: -50
      label_along_offset_px: -42
      color:
        $constant: annotation_color_red
gallery:
  $constant: parameter_gallery_settings
variant_collections:
  product_views: [default, empty, top]
  parameter_gallery: [Magnet_None, Magnet_All, Rim2_LipHeight3, WidthGrid4_DepthGrid3]
variants:
- name: default
- name: empty
  render:
    fit_margin: 0
    camera_view_preset: technical_iso
  annotation_overrides:
    gridfinity_width_dimension:
      enabled: false
    gridfinity_depth_dimension:
      enabled: false
  unset: [scene.objects.model.model.defines.magnet_position, render.camera_location_offset_mm,
    render.camera_look_at]
- name: top
  object_overrides:
    model:
      model:
        defines:
          shelf_back_offset: 8
          shelf_side_rim: 4
          shelf_front_rim: 4
          magnet_position: None
  render:
    fit_margin: 0
    camera_view_preset: top_front
  annotation_overrides:
    gridfinity_width_dimension:
      enabled: false
    gridfinity_depth_dimension:
      enabled: false
    shelf_back_offset_dimension:
      enabled: true
    shelf_side_rim_dimension:
      enabled: true
    shelf_front_rim_dimension:
      enabled: true
  unset: [render.camera_location_offset_mm, render.camera_look_at]
- name: Magnet_None
  extends_variant: empty
  object_overrides:
    model:
      model:
        defines:
          magnet_position: None
- name: Magnet_All
  extends_variant: empty
  object_overrides:
    model:
      model:
        defines:
          magnet_position: All
- name: Rim2_LipHeight3
  extends_variant: empty
  object_overrides:
    model:
      model:
        defines:
          magnet_position: None
          shelf_side_rim: 2
          shelf_front_rim: 2
          shelf_rim_lip_height: 3
- name: WidthGrid4_DepthGrid3
  extends_variant: empty
  object_overrides:
    model:
      model:
        defines:
          magnet_position: None
          gridfinity_width_grids: 4
          gridfinity_depth_grids: 3
      transform:
        location_mm: [-(3 * og_tile_size), 0, -og_tile_size]
