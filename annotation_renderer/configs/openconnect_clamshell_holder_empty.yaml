      #   holder_slot_column_limit: 1
    transform:
      location_mm: [0, "-(item_depth+holder_thickness+3.72) / 2", -(item_height+holder_thickness*2) / 2]
      rotation_deg: [0, 0, 0]
      scale:
        $constant: blender_scene_scale_vector
render:
