$schema: ../schemas/annotation-render-config.schema.json
extends: base_scene.yaml
variant_name: openconnect_clamshell_holder_default
job_name: clamshell_holder_scene_default
scene:
  objects:
  - id: model
    model:
      scad_file: openconnect_clamshell_holder.scad
      # defines:
